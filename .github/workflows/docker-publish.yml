name: Docker Image CI/CD

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger workflow on version tag pushes (e.g., v2.2.3)

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set lowercase image name
      run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build Docker Image
      run: docker build -t $IMAGE:${{ github.ref_name }} -t $IMAGE:latest .

    - name: Push Docker Image
      run: |
        docker push $IMAGE:${{ github.ref_name }}
        docker push $IMAGE:latest
